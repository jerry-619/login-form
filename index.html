<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Login Page</title>
</head>
<body>
    
 <div class="container">
    <div class="box" data-tilt>
        <div class="socialicons">
            <a href="https://google.com" target="_blank"> 
                <i class="fa-brands fa-google-plus fa-beat"></i></a>
                <a href="https://facebook.com" target="_blank">
            <i class="fa-brands fa-facebook fa-beat"></i></a>
            <a href="https://x.com" target="_blank">
            <i class="fa-brands fa-twitter fa-beat"></i></a>
        </div>
        <!------------------ Login Box --------------------->
        <div class="box-login" id="login">

            <div class="top-header">
                <h3>Login Now</h3>
                <small>We are happy to have you back.</small>
            </div>
            <form>
                <div class="input-group">
                    <div class="input-field">
                        <input type="text" class="input-box" id="logEmail" required>
                        <label for="logEmail">Email address</label>
                    </div>
                    <div class="input-field">
                        <input type="password" class="input-box" id="logPassword" required>
                        <label for="logPassword">Password</label>
                    </div>
    
                    <div class="input-field">
                        <input type="submit" class="input-submit" value="Log in">
                    </div>
                    <div class="forgot">
                        <a href="#">Forgot password?</a>
                    </div>
                </div>
            </form>
            
        </div>

     <!-------------------- Register --------------------------->
      
     <div class="box-register" id="register">

        <div class="top-header">
            <h3>Sign Up, Now</h3>
            <small>We are happy to have you with us.</small>
        </div>
        <form>
        <div class="input-group">
            <div class="input-field">
                <input type="text" class="input-box" id="regUser" required>
                <label for="regUser">Username</label>
            </div>
            <div class="input-field">
                <input type="text" class="input-box" id="regEmail" required>
                <label for="regEmail">Email address</label>
            </div>
            <div class="input-field">
                <input type="password" class="input-box" id="regPassword" required>
                <label for="regPassword">Password</label>
            </div>
            <div class="remember">
                <input type="checkbox" id="formCheck" class="check">
                <label for="formCheck"> I accept terms and conditions</label>
            </div>
            <div class="input-field">
                <input type="submit" class="input-submit" value="Register">
            </div>
          </form>  
        </div>

    </div>

    <!------------------------ Switch Button -------------------------->
      
    <div class="switch">
        <a href="#" class="login" onclick="login()">Login</a>
        <a href="#" class="register" onclick="register()">Register</a>
        <div class="btn-active" id="btn"></div>
    </div>

    </div>
 </div>
<script src="/script.js"></script>
</body>
</html>
